# FMC — API + SQLite persistente en volumen montado (./docker-data/fmc.db)
# Uso: docker compose up -d   |   make up
# Otros devs: clonan el repo, copian .env.example → .env y ejecutan lo mismo.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fmc-api:local
    container_name: fmc-api
    ports:
      - "${FMC_HTTP_PORT:-5214}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Data Source=/data/fmc.db
      Jwt__Key: "${JWT_KEY:-development-key-change-in-production-min-32chars!}"
      Jwt__Issuer: FMC
      Jwt__Audience: FmcClients
      Jwt__ExpiryMinutes: "60"
      # Solo HTTP en el contenedor (evita redirects que rompen curl / Swagger)
      FMC_DISABLE_HTTPS_REDIRECT: "1"
    volumes:
      # Host: ruta local donde queda fmc.db (sqlite3, DBeaver, etc.)
      - ./docker-data:/data
    restart: unless-stopped
